<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>친구의 견적 분석 결과 — 견적분석</title>
<meta property="og:title" content="친구가 견적 분석 결과를 공유했어요">
<meta property="og:description" content="내 인테리어 견적도 적정한지 확인해보세요.">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;}
body{background:#F8F6F2;color:#0F0E0C;min-height:100vh;}
.topbar{background:#0F0E0C;height:56px;display:flex;align-items:center;padding:0 1.5rem;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.logo span{color:#A0BFF8;}
.sp{flex:1;}
.top-btn{background:#1F4FD8;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
.wrap{max-width:680px;margin:0 auto;padding:2rem 1.5rem;}

/* 블러 */
.blur-wrap{position:relative;}
.blur-inner{transition:filter .3s;}
.blur-wrap.locked .blur-inner{filter:blur(7px);pointer-events:none;user-select:none;}
.popup-overlay{display:none;position:absolute;inset:0;background:rgba(248,246,242,0.82);z-index:10;align-items:center;justify-content:center;padding:20px;border-radius:14px;}
.blur-wrap.locked .popup-overlay{display:flex;}
.popup-card{background:#fff;border:1px solid #E8E5E0;border-radius:16px;padding:28px 22px;text-align:center;width:100%;max-width:320px;}
.popup-icon{width:48px;height:48px;border-radius:50%;background:#F8F6F2;border:1px solid #E8E5E0;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.popup-title{font-size:16px;font-weight:800;color:#0F0E0C;letter-spacing:-.3px;margin-bottom:8px;line-height:1.4;}
.popup-sub{font-size:12px;color:#8A8780;line-height:1.7;margin-bottom:18px;}
.btn-popup-main{display:block;width:100%;padding:13px;background:#0F0E0C;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;text-decoration:none;margin-bottom:8px;}
.btn-popup-main:hover{opacity:.85;}
.btn-popup-sub{display:block;font-size:12px;color:#8A8780;text-decoration:none;margin-top:4px;}

/* 결과 카드 */
.verdict-card{border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.verdict-card.exp{background:#FCEAEA;border:1px solid #F0B0B0;}
.verdict-card.fair{background:#FBF5E0;border:1px solid #E8D080;}
.verdict-card.cheap{background:#EBF7F0;border:1px solid #B0DEC4;}
.v-icon{font-size:24px;flex-shrink:0;}
.v-label{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;}
.verdict-card.exp .v-label{color:#9A1F1F;}
.verdict-card.fair .v-label{color:#7A6010;}
.verdict-card.cheap .v-label{color:#1A6B3E;}
.v-title{font-size:15px;font-weight:800;color:#0F0E0C;letter-spacing:-.3px;}
.v-sub{font-size:11px;color:#4A4743;margin-top:3px;}
.v-total{margin-left:auto;text-align:right;flex-shrink:0;}
.v-total-l{font-size:9px;color:#8A8780;margin-bottom:2px;}
.v-total-n{font-size:19px;font-weight:800;color:#0F0E0C;letter-spacing:-.5px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-c{background:#fff;border:1px solid #E8E5E0;border-radius:10px;padding:12px 14px;}
.stat-l{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#B8B5B0;margin-bottom:5px;}
.stat-n{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#0F0E0C;}
.stat-n.exp{color:#9A1F1F;}.stat-n.fair{color:#7A6010;}.stat-n.cheap{color:#1A6B3E;}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px;}
.item-card{background:#fff;border:1px solid #E8E5E0;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.i-name{font-size:13px;font-weight:700;color:#0F0E0C;}
.i-cat{font-size:10px;color:#8A8780;margin-top:2px;}
.i-right{display:flex;align-items:center;gap:8px;}
.i-pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:4px;}
.i-pill.exp{background:#FCEAEA;color:#9A1F1F;}
.i-pill.fair{background:#FBF5E0;color:#7A6010;}
.i-pill.cheap{background:#EBF7F0;color:#1A6B3E;}
.i-amt{font-size:13px;font-weight:800;color:#0F0E0C;}
.unlocked-banner{background:#EBF7F0;border:1px solid #4CAF82;border-radius:10px;padding:11px 16px;display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;font-size:13px;font-weight:700;color:#1A6B3E;}
.cta-section{background:#0F0E0C;border-radius:14px;padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:1.25rem;}
.cta-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px;line-height:1.4;margin-bottom:3px;}
.cta-sub{font-size:11px;color:rgba(255,255,255,.45);line-height:1.5;}
.cta-btn{background:#fff;color:#0F0E0C;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:#8A8780;text-align:center;}
.state-icon{font-size:36px;}
.state-text{font-size:15px;font-weight:700;color:#0F0E0C;}
.state-sub{font-size:13px;}

/* 인라인 로그인 모달 */
.auth-modal-wrap{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;}
.auth-modal-wrap.show{display:flex;}
.auth-sheet{background:#fff;border-radius:20px 20px 0 0;padding:2rem 1.5rem 2.5rem;width:100%;max-width:480px;}
.auth-handle{width:36px;height:4px;background:#E8E5E0;border-radius:2px;margin:0 auto 1.5rem;}
.auth-title{font-size:18px;font-weight:800;color:#0F0E0C;text-align:center;margin-bottom:6px;letter-spacing:-.5px;}
.auth-sub{font-size:13px;color:#8A8780;text-align:center;margin-bottom:1.5rem;}
.auth-input{width:100%;padding:12px 14px;border:1.5px solid #E8E5E0;border-radius:8px;font-family:inherit;font-size:14px;color:#0F0E0C;background:#F8F6F2;outline:none;margin-bottom:10px;}
.auth-input:focus{border-color:#1F4FD8;background:#fff;}
.btn-auth-submit{width:100%;padding:13px;background:#0F0E0C;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:12px;}
.btn-auth-submit:hover{opacity:.85;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:#B8B5B0;font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#E8E5E0;}
.btn-social{width:100%;padding:12px;border:1.5px solid #E8E5E0;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:#0F0E0C;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-social:hover{background:#F8F6F2;}
.auth-switch{text-align:center;font-size:12px;color:#8A8780;margin-top:12px;}
.auth-switch span{color:#1F4FD8;font-weight:700;cursor:pointer;}
.auth-error{background:#FCEAEA;color:#791F1F;border-radius:7px;padding:8px 12px;font-size:12px;margin-bottom:10px;display:none;}
.auth-close-btn{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;font-size:20px;cursor:pointer;color:#8A8780;}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" style="text-decoration:none;"><span class="logo">견적<span>분석</span></span></a>
  <div class="sp"></div>
  <a href="/" class="top-btn">내 견적 분석하기</a>
</header>

<div class="wrap" id="mainWrap">
  <div class="state-box">
    <div class="state-icon">⏳</div>
    <div class="state-text">불러오는 중...</div>
  </div>
</div>

<!-- 인라인 로그인/가입 모달 -->
<div class="auth-modal-wrap" id="authModalWrap" onclick="handleModalBg(event)">
  <div class="auth-sheet" style="position:relative;">
    <button class="auth-close-btn" onclick="closeAuthSheet()">×</button>
    <div class="auth-handle"></div>
    <div class="auth-title" id="authSheetTitle">로그인하고 확인하기</div>
    <div class="auth-sub" id="authSheetSub">친구의 상세 견적을 무료로 확인하세요</div>
    <div class="auth-error" id="authSheetError"></div>

    <div id="authSheetEmailForm">
      <input class="auth-input" type="email" id="authSheetEmail" placeholder="이메일" autocomplete="email">
      <input class="auth-input" type="password" id="authSheetPw" placeholder="비밀번호" autocomplete="current-password">
      <button class="btn-auth-submit" id="authSheetSubmit" onclick="submitAuth()">로그인</button>
    </div>

    <div class="auth-divider">또는</div>
    <button class="btn-social" onclick="doSocialInShare('google')">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Google로 계속하기
    </button>
    <button class="btn-social" onclick="doSocialInShare('kakao')" style="background:#FEE500;border-color:#FEE500;color:#3C1E1E;">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 0C4.03 0 0 3.134 0 7c0 2.493 1.647 4.678 4.125 5.938L3.1 17.1a.375.375 0 00.571.4l5.27-3.498C9.294 14.003 9.645 14 10 14c4.97 0 9-3.134 9-7S13.97 0 9 0z" fill="#3C1E1E"/></svg>
      카카오로 계속하기
    </button>

    <div class="auth-switch" id="authSwitchText">
      계정이 없으신가요? <span onclick="toggleAuthMode()">회원가입</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://vzztfgqubrguwujlsadh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6enRmZ3F1YnJndXd1amxzYWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTQyNzUsImV4cCI6MjA5MDE3MDI3NX0.EtkCZB5NUtNpJbzZbFpy_NGMBx60Cy-oJRKza1YTI1E';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const clsMap  = {비쌈:'exp', 적정:'fair', 저렴:'cheap'};
const iconMap  = {비쌈:'🔴', 적정:'🟡', 저렴:'💚'};
const labelMap = {비쌈:'전체 종합: 비쌈', 적정:'전체 종합: 적정', 저렴:'전체 종합: 저렴'};
const titleMap = {비쌈:'시중 평균보다 비싼 견적이에요', 적정:'시중 평균 수준의 견적이에요', 저렴:'시중 평균보다 저렴한 견적이에요'};

let currentShareId = null;
let authMode = 'login'; /* login | signup */

function fmt(n){
  if(!n||isNaN(n)) return '—';
  if(n>=100000000) return (n/100000000).toFixed(1)+'억원';
  if(n>=10000) return Math.round(n/10000).toLocaleString('ko-KR')+'만원';
  return n.toLocaleString('ko-KR')+'원';
}

function getShareId(){
  const pathMatch = location.pathname.match(/\/share\/([a-z0-9]+)/i);
  return pathMatch ? pathMatch[1] : new URLSearchParams(location.search).get('id');
}

function buildResultHTML(d){
  const c = clsMap[d.overallVerdict] || 'fair';
  const items = d.allItems || d.previewItems || [];
  return `
    <div class="verdict-card ${c}">
      <div class="v-icon">${iconMap[d.overallVerdict]||'🟡'}</div>
      <div>
        <div class="v-label">${labelMap[d.overallVerdict]||''}</div>
        <div class="v-title">${titleMap[d.overallVerdict]||''}</div>
        ${d.overallComment ? `<div class="v-sub">${d.overallComment}</div>` : ''}
      </div>
      <div class="v-total">
        <div class="v-total-l">총 견적금액</div>
        <div class="v-total-n">${fmt(d.totalAmount)}</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-c"><div class="stat-l">🔴 비쌈</div><div class="stat-n exp">${d.expCount||0}개</div></div>
      <div class="stat-c"><div class="stat-l">🟡 적정</div><div class="stat-n fair">${d.fairCount||0}개</div></div>
      <div class="stat-c"><div class="stat-l">💚 저렴</div><div class="stat-n cheap">${d.cheapCount||0}개</div></div>
    </div>
    <div class="item-list">
      ${items.map(item => {
        const ic = clsMap[item.verdict]||'fair';
        return `<div class="item-card">
          <div><div class="i-name">${item.name||''}</div><div class="i-cat">${item.category||''}</div></div>
          <div class="i-right">
            <span class="i-pill ${ic}">${item.verdict||''}</span>
            <span class="i-amt">${fmt(item.amount)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function showBlurred(d, shareId){
  const resultHTML = buildResultHTML(d);
  document.getElementById('mainWrap').innerHTML = `
    <div class="blur-wrap locked">
      <div class="blur-inner">${resultHTML}</div>
      <div class="popup-overlay">
        <div class="popup-card">
          <div class="popup-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#0F0E0C" stroke-width="1.6" stroke-linecap="round">
              <rect x="3" y="10" width="16" height="11" rx="2.5"/>
              <path d="M7 10V7a4 4 0 018 0v3"/>
            </svg>
          </div>
          <div class="popup-title">친구의 상세 견적은<br>로그인 후 확인할 수 있어요</div>
          <div class="popup-sub">내가 받은 견적도 적정한지<br>함께 판별해드릴게요.</div>
          <button class="btn-popup-main" onclick="openAuthSheet('login')">로그인하고 확인하기</button>
          <a class="btn-popup-sub" onclick="openAuthSheet('signup')" style="cursor:pointer;">
            아직 계정이 없으신가요? <span style="color:#1F4FD8;font-weight:700;">회원가입</span>
          </a>
        </div>
      </div>
    </div>`;
}

function showUnlocked(d){
  const resultHTML = buildResultHTML(d);
  document.getElementById('mainWrap').innerHTML = `
    <div class="unlocked-banner">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#1A6B3E" stroke-width="1.5" stroke-linecap="round"><path d="M12.5 4.5l-7 7L2 8"/></svg>
      친구의 상세 견적 결과를 확인할 수 있어요
    </div>
    ${resultHTML}
    <div class="cta-section">
      <div>
        <div class="cta-title">내가 받은 견적도 적정한지 알고 싶다면?</div>
        <div class="cta-sub">PDF·이미지 업로드만 하면 30초 안에 판별</div>
      </div>
      <a href="/?newAnalysis=1" class="cta-btn">내 견적 판별하기</a>
    </div>`;
}

/* ── 로그인 모달 ── */
function openAuthSheet(mode){
  authMode = mode || 'login';
  const isLogin = authMode === 'login';
  document.getElementById('authSheetTitle').textContent = isLogin ? '로그인하고 확인하기' : '회원가입하고 확인하기';
  document.getElementById('authSheetSub').textContent = '친구의 상세 견적을 무료로 확인하세요';
  document.getElementById('authSheetSubmit').textContent = isLogin ? '로그인' : '회원가입';
  document.getElementById('authSwitchText').innerHTML = isLogin
    ? '계정이 없으신가요? <span onclick="toggleAuthMode()">회원가입</span>'
    : '이미 계정이 있으신가요? <span onclick="toggleAuthMode()">로그인</span>';
  document.getElementById('authSheetError').style.display = 'none';
  document.getElementById('authModalWrap').classList.add('show');
}

function closeAuthSheet(){
  document.getElementById('authModalWrap').classList.remove('show');
}

function handleModalBg(e){
  if(e.target === document.getElementById('authModalWrap')) closeAuthSheet();
}

function toggleAuthMode(){
  openAuthSheet(authMode === 'login' ? 'signup' : 'login');
}

function showAuthErr(msg){
  const el = document.getElementById('authSheetError');
  el.textContent = msg; el.style.display = 'block';
}

async function submitAuth(){
  const email = document.getElementById('authSheetEmail').value.trim();
  const pw = document.getElementById('authSheetPw').value;
  const btn = document.getElementById('authSheetSubmit');
  if(!email || !pw){ showAuthErr('이메일과 비밀번호를 입력해주세요'); return; }

  btn.disabled = true;
  btn.textContent = authMode === 'login' ? '로그인 중...' : '가입 중...';

  try{
    const resp = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: authMode, email, password: pw })
    });
    const data = await resp.json();
    if(!resp.ok || !data.success) throw new Error(data.error || '오류가 발생했어요');

    /* 회원가입 — 이메일 인증 대기 */
    if(authMode === 'signup'){
      document.getElementById('authSheetTitle').textContent = '이메일을 확인해주세요';
      document.getElementById('authSheetSub').textContent = `${email} 로 인증 메일을 보냈어요.\n메일의 링크를 클릭하면 가입이 완료돼요.`;
      document.getElementById('authSheetSub').style.whiteSpace = 'pre-line';
      document.getElementById('authSheetEmailForm').style.display = 'none';
      document.querySelector('.auth-divider').style.display = 'none';
      document.querySelectorAll('.btn-social').forEach(b => b.style.display = 'none');
      document.getElementById('authSwitchText').style.display = 'none';
      const okBtn = document.createElement('button');
      okBtn.className = 'btn-auth-submit';
      okBtn.style.marginTop = '1rem';
      okBtn.textContent = '확인';
      okBtn.onclick = closeAuthSheet;
      document.getElementById('authSheetSub').after(okBtn);
      return;
    }

    /* 로그인 — 토큰을 직접 사용해서 보상 처리 */
    const accessToken = data.session?.access_token || data.access_token;
    if(!accessToken) throw new Error('로그인 토큰이 없어요');

    /* Supabase 세션 세팅 */
    await _supabase.auth.setSession({
      access_token: accessToken,
      refresh_token: data.session?.refresh_token || ''
    });

    closeAuthSheet();
    /* 토큰 직접 전달해서 보상 처리 */
    await rewardAndShow(accessToken, data.user?.id);

  }catch(err){
    showAuthErr(err.message);
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? '로그인' : '회원가입';
  }
}

function doSocialInShare(provider){
  /* 소셜 로그인 후 share 페이지로 돌아오도록 redirectTo 설정 */
  const redirectTo = encodeURIComponent(window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'socialReturn=1');
  window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=${provider}&redirect_to=${redirectTo}`;
}

async function rewardAndShow(directToken, directUserId){
  /* 토큰 확보 — 직접 전달받거나 세션에서 가져오기 */
  let userId = directUserId;
  if(!userId){
    const { data: { session } } = await _supabase.auth.getSession();
    if(!session){ console.warn('rewardAndShow: 세션 없음'); await loadShare(); return; }
    userId = session.user.id;
  }

  /* 공유자 크레딧 보상 시도 */
  try{
    const shareResp = await fetch(`/api/share?id=${currentShareId}`);
    const shareJson = await shareResp.json();
    const sharerId = shareJson.data?.sharerId;
    console.log('보상 시도 - sharerId:', sharerId, 'userId:', userId);

    if(sharerId && sharerId !== userId){
      const rewardResp = await fetch('/api/credits?action=rewardSharer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sharerId, shareId: currentShareId, description: '공유 링크 신규 가입 보상' })
      });
      const rewardData = await rewardResp.json();
      console.log('보상 결과:', rewardData);
    } else {
      console.log('보상 스킵 - sharerId 없거나 본인 링크');
    }
  }catch(e){ console.error('보상 처리 실패:', e); }

  /* 결과 다시 로드해서 잠금 해제 */
  await loadShare();
}

async function loadShare(){
  const shareId = getShareId();
  if(!shareId){ showError('잘못된 링크예요', '올바른 공유 링크인지 확인해주세요.'); return; }
  currentShareId = shareId;

  try{
    const [{ data: { session } }, shareResp] = await Promise.all([
      _supabase.auth.getSession(),
      fetch(`/api/share?id=${shareId}`)
    ]);
    const json = await shareResp.json();
    if(!shareResp.ok || !json.success) throw new Error(json.error || '결과를 불러올 수 없어요');

    const d = json.data;

    /* 소셜 로그인 복귀 처리 */
    const params = new URLSearchParams(location.search);
    if(params.get('socialReturn') && session){
      window.history.replaceState({}, '', location.pathname);
      await rewardAndShow();
      return;
    }

    if(session){
      showUnlocked(d);
    } else {
      showBlurred(d, shareId);
    }
  }catch(err){
    showError('결과를 불러올 수 없어요', err.message);
  }
}

function showError(title, sub){
  document.getElementById('mainWrap').innerHTML = `
    <div class="state-box">
      <div class="state-icon">😕</div>
      <div class="state-text">${title}</div>
      <div class="state-sub">${sub||''}</div>
      <a href="/" style="margin-top:16px;color:#1F4FD8;font-weight:700;font-size:14px;">홈으로 돌아가기</a>
    </div>`;
}

loadShare();
</script>
