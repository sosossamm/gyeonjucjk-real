<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 분석 결과 공유 — 견적분석</title>
<meta property="og:title" content="내 인테리어 견적, 적정한 걸까요?">
<meta property="og:description" content="공유된 견적 분석 결과를 확인하세요.">
<meta property="og:site_name" content="견적분석">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Apple SD Gothic Neo','Pretendard',sans-serif;}
body{background:#F8F6F2;color:#0F0E0C;min-height:100vh;}
.topbar{background:#0F0E0C;height:56px;display:flex;align-items:center;padding:0 1.5rem;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.logo span{color:#A0BFF8;}
.sp{flex:1;}
.top-btn{background:#1F4FD8;color:#fff;border:none;padding:7px 16px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
.wrap{max-width:680px;margin:0 auto;padding:2rem 1.5rem;}

/* 블러 섹션 */
.blur-section{position:relative;border-radius:14px;overflow:hidden;}
.blur-content{filter:blur(6px);pointer-events:none;user-select:none;}
.blur-overlay{position:absolute;inset:0;background:rgba(248,246,242,0.75);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border:1px solid #E8E5E0;border-radius:14px;padding:28px 22px;text-align:center;width:100%;max-width:300px;}
.lock-icon{width:46px;height:46px;border-radius:50%;background:#F8F6F2;border:1px solid #E8E5E0;display:flex;align-items:center;justify-content:center;margin:0 auto 13px;}
.login-title{font-size:16px;font-weight:800;color:#0F0E0C;letter-spacing:-.3px;margin-bottom:6px;}
.login-sub{font-size:12px;color:#8A8780;line-height:1.65;margin-bottom:16px;}
.btn-login-main{display:block;width:100%;padding:12px;background:#0F0E0C;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px;text-decoration:none;}
.btn-login-main:hover{opacity:.85;}
.btn-signup-sub{display:block;width:100%;padding:11px;background:#F8F6F2;color:#0F0E0C;border:1.5px solid #E8E5E0;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
.btn-signup-sub:hover{background:#EDEAE5;}

/* 결과 카드들 */
.verdict-card{border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.verdict-card.fair{background:#FBF5E0;border:1px solid #E8D080;}
.verdict-card.exp{background:#FCEAEA;border:1px solid #F0B0B0;}
.verdict-card.cheap{background:#EBF7F0;border:1px solid #B0DEC4;}
.v-icon{font-size:22px;flex-shrink:0;}
.v-info .vl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.verdict-card.fair .v-info .vl{color:#7A6010;}
.verdict-card.exp .v-info .vl{color:#9A1F1F;}
.verdict-card.cheap .v-info .vl{color:#1A6B3E;}
.v-info .vt{font-size:14px;font-weight:800;color:#0F0E0C;letter-spacing:-.3px;}
.v-info .vs{font-size:11px;color:#4A4743;margin-top:2px;}
.v-total{margin-left:auto;text-align:right;flex-shrink:0;}
.v-total .tl{font-size:9px;color:#8A8780;margin-bottom:2px;}
.v-total .ta{font-size:18px;font-weight:800;color:#0F0E0C;letter-spacing:-.5px;}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-c{background:#fff;border:1px solid #E8E5E0;border-radius:8px;padding:10px 12px;}
.stat-l{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#B8B5B0;margin-bottom:4px;}
.stat-n{font-size:20px;font-weight:800;letter-spacing:-.5px;color:#0F0E0C;}
.stat-n.exp{color:#9A1F1F;}
.stat-n.cheap{color:#1A6B3E;}

.item-card{background:#fff;border:1px solid #E8E5E0;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.item-card:last-child{margin-bottom:0;}
.i-left .i-name{font-size:12px;font-weight:700;color:#0F0E0C;}
.i-left .i-cat{font-size:10px;color:#8A8780;margin-top:2px;}
.i-right{display:flex;align-items:center;gap:8px;}
.i-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;}
.i-pill.exp{background:#FCEAEA;color:#9A1F1F;}
.i-pill.fair{background:#FBF5E0;color:#7A6010;}
.i-pill.cheap{background:#EBF7F0;color:#1A6B3E;}
.i-amt{font-size:13px;font-weight:800;color:#0F0E0C;}

/* 로그인 후 배너 */
.unlocked-banner{background:#EBF7F0;border:1px solid #4CAF82;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-bottom:1rem;font-size:12px;font-weight:700;color:#1A6B3E;}

/* CTA */
.cta-card{background:#0F0E0C;border-radius:14px;padding:1.5rem;text-align:center;margin-top:1.25rem;}
.cta-t{font-size:15px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-.3px;}
.cta-s{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:14px;line-height:1.6;}
.cta-btn{background:#1F4FD8;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}

/* 로딩/에러 */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:#8A8780;}
.state-icon{font-size:36px;}
.state-text{font-size:15px;font-weight:700;color:#0F0E0C;}
.state-sub{font-size:13px;}
</style>
</head>
<body>

<header class="topbar">
  <span class="logo">견적<span>분석</span></span>
  <div class="sp"></div>
  <a href="/" class="top-btn">내 견적 분석하기</a>
</header>

<div class="wrap" id="mainWrap">
  <div class="state-box">
    <div class="state-icon">⏳</div>
    <div class="state-text">불러오는 중...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://vzztfgqubrguwujlsadh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6enRmZ3F1YnJndXd1amxzYWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTQyNzUsImV4cCI6MjA5MDE3MDI3NX0.EtkCZB5NUtNpJbzZbFpy_NGMBx60Cy-oJRKza1YTI1E';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const clsMap = {비쌈:'exp', 적정:'fair', 저렴:'cheap'};
const iconMap = {비쌈:'🔴', 적정:'🟡', 저렴:'💚'};
const labelMap = {비쌈:'전체 종합: 비쌈', 적정:'전체 종합: 적정', 저렴:'전체 종합: 저렴'};
const titleMap = {비쌈:'시중 평균보다 비싼 견적이에요', 적정:'시중 평균 수준의 견적이에요', 저렴:'시중 평균보다 저렴한 견적이에요'};

function fmt(n){
  if(!n||isNaN(n)) return '—';
  if(n>=100000000) return (n/100000000).toFixed(1)+'억원';
  if(n>=10000) return Math.round(n/10000).toLocaleString('ko-KR')+'만원';
  return n.toLocaleString('ko-KR')+'원';
}

function getShareId(){
  const pathMatch = location.pathname.match(/\/share\/([a-z0-9]+)/i);
  return pathMatch ? pathMatch[1] : new URLSearchParams(location.search).get('id');
}

/* 결과 HTML 생성 */
function buildResultHTML(d){
  const c = clsMap[d.overallVerdict] || 'fair';
  const items = d.previewItems || [];
  const fairCount = (d.itemCount||0) - (d.expCount||0) - (d.cheapCount||0);

  return `
    <div class="verdict-card ${c}">
      <div class="v-icon">${iconMap[d.overallVerdict]||'🟡'}</div>
      <div class="v-info">
        <div class="vl">${labelMap[d.overallVerdict]||''}</div>
        <div class="vt">${titleMap[d.overallVerdict]||''}</div>
        ${d.overallComment?`<div class="vs">${d.overallComment}</div>`:''}
      </div>
      <div class="v-total">
        <div class="tl">총 견적금액</div>
        <div class="ta">${fmt(d.totalAmount)}</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-c"><div class="stat-l">전체 항목</div><div class="stat-n">${d.itemCount||0}개</div></div>
      <div class="stat-c"><div class="stat-l">🔴 비쌈</div><div class="stat-n exp">${d.expCount||0}개</div></div>
      <div class="stat-c"><div class="stat-l">💚 저렴</div><div class="stat-n cheap">${d.cheapCount||0}개</div></div>
    </div>
    ${items.map(item=>{
      const ic = clsMap[item.verdict]||'fair';
      return `<div class="item-card">
        <div class="i-left">
          <div class="i-name">${item.name||''}</div>
          <div class="i-cat">${item.category||''}</div>
        </div>
        <div class="i-right">
          <span class="i-pill ${ic}">${item.verdict||''}</span>
          <span class="i-amt">${fmt(item.amount)}</span>
        </div>
      </div>`;
    }).join('')}
    ${(d.itemCount||0) > items.length ? `
      <div class="item-card" style="justify-content:center;">
        <div style="font-size:11px;color:#B8B5B0;font-weight:600;">+ ${(d.itemCount||0) - items.length}개 항목 더 있음</div>
      </div>` : ''}`;
}

async function loadShare(){
  const shareId = getShareId();
  if(!shareId){ showError('잘못된 링크예요', '올바른 공유 링크인지 확인해주세요.'); return; }

  try{
    /* 현재 로그인 상태 확인 */
    const { data: { session } } = await _supabase.auth.getSession();
    const isLoggedIn = !!session;

    /* 공유 데이터 로드 */
    const resp = await fetch(`/api/share?id=${shareId}`);
    const json = await resp.json();
    if(!resp.ok || !json.success) throw new Error(json.error || '결과를 불러올 수 없어요');

    const d = json.data;
    const resultHTML = buildResultHTML(d);
    const loginUrl = `/?from=share&shareId=${shareId}&action=login`;
    const signupUrl = `/?from=share&shareId=${shareId}&action=signup`;

    if(isLoggedIn){
      /* 로그인 상태 — 바로 결과 표시 */
      document.getElementById('mainWrap').innerHTML = `
        <div class="unlocked-banner">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="#1A6B3E" stroke-width="1.5" stroke-linecap="round"><path d="M12.5 4.5l-7 7L2 8"/></svg>
          공유된 견적 분석 결과를 확인할 수 있어요
        </div>
        ${resultHTML}
        <div class="cta-card">
          <div class="cta-t">내 견적서도 분석해볼까요?</div>
          <div class="cta-s">PDF·이미지 업로드만 하면<br>30초 안에 항목별 적정가 판별</div>
          <a href="/" class="cta-btn">무료로 분석 시작하기</a>
        </div>`;
    } else {
      /* 비로그인 — 블러 + 로그인 유도 */
      document.getElementById('mainWrap').innerHTML = `
        <div class="blur-section">
          <div class="blur-content">${resultHTML}</div>
          <div class="blur-overlay">
            <div class="login-card">
              <div class="lock-icon">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#0F0E0C" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="9" width="14" height="10" rx="2"/><path d="M6 9V6a4 4 0 018 0v3"/></svg>
              </div>
              <div class="login-title">로그인하고 견적 내용 확인하기</div>
              <div class="login-sub">공유된 견적 분석 결과를<br>로그인 후 무료로 확인할 수 있어요.</div>
              <a href="${loginUrl}" class="btn-login-main">로그인하기</a>
              <a href="${signupUrl}" class="btn-signup-sub">회원가입하기</a>
            </div>
          </div>
        </div>`;
    }
  }catch(err){
    showError('결과를 불러올 수 없어요', err.message);
  }
}

function showError(title, sub){
  document.getElementById('mainWrap').innerHTML = `
    <div class="state-box">
      <div class="state-icon">😕</div>
      <div class="state-text">${title}</div>
      <div class="state-sub">${sub||''}</div>
      <a href="/" style="margin-top:16px;color:#1F4FD8;font-weight:700;font-size:14px;">홈으로 돌아가기</a>
    </div>`;
}

loadShare();
</script>
</body>
</html>
