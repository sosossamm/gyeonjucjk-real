<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적분석 — 인테리어 데이터 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://js.tosspayments.com/v1/payment"></script>
<style>
:root {
  --ink: #0F0E0C; --paper: #F8F6F2; --surface: #FFFFFF; --rule: #E8E5E0;
  --accent: #1F4FD8; --muted: #8A8780; --radius: 14px;
}

body {
  font-family: 'Pretendard', sans-serif;
  background-color: var(--paper); color: var(--ink);
  margin: 0; padding: 0; line-height: 1.6;
}

.app-container { max-width: 600px; margin: 0 auto; padding: 20px; }

/* 입력 영역 스타일 (기존 UI 유지) */
.input-section {
  background: var(--surface); padding: 24px;
  border-radius: var(--radius); border: 1px solid var(--rule);
  margin-bottom: 24px;
}

.mode-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab {
  flex: 1; padding: 12px; text-align: center; border-radius: 8px;
  background: #eee; cursor: pointer; font-weight: 600;
}
.tab.active { background: var(--ink); color: #fff; }

/* 결과 영역 스타일 */
.results-wrap { display: none; margin-top: 30px; }
.results-wrap.show { display: block; }

.summary-card {
  background: var(--surface); padding: 24px;
  border-radius: var(--radius); border: 1px solid var(--rule);
  margin-bottom: 20px; text-align: center;
}

/* 상세 내역 블러 및 페이월 */
.detail-box {
  position: relative; background: var(--surface);
  border-radius: var(--radius); border: 1px solid var(--rule);
  overflow: hidden; min-height: 350px;
}

.detail-inner {
  padding: 20px; transition: filter 0.4s ease;
}

/* 잠금 상태 스타일 */
.is-locked .detail-inner {
  filter: blur(12px); pointer-events: none; user-select: none;
}

.paywall-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255, 255, 255, 0.4); z-index: 20;
}

.is-unlocked .paywall-overlay { display: none; }
.is-unlocked .detail-inner { filter: none; }

.paywall-card {
  background: #fff; padding: 30px 20px; border-radius: 18px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15); text-align: center; width: 85%;
}

.btn-pay {
  width: 100%; padding: 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 12px; font-weight: 700; font-size: 1.1rem;
  margin-top: 15px; cursor: pointer;
}

/* 분석 아이템 행 */
.item-row {
  display: flex; justify-content: space-between;
  padding: 15px 0; border-bottom: 1px solid var(--rule);
}
</style>
</head>
<body>

<div class="app-container">
  <div class="input-section">
    <div class="mode-tabs">
      <div class="tab active" onclick="switchMode('file')">파일 업로드</div>
      <div class="tab" onclick="switchMode('manual')">직접 입력하기</div>
    </div>
    
    <div id="fileMode">
      <p style="font-size: 0.9rem; color: #666;">견적서 PDF 또는 이미지를 업로드하세요.</p>
      <input type="file" id="fileInput" style="margin-bottom: 15px;">
    </div>
    
    <div id="manualMode" style="display:none;">
      <input type="number" id="areaNum" placeholder="평수 입력 (예: 32)" style="width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box;">
      <p style="font-size: 0.8rem; color: #888;">* 공정별 금액은 하단 분석 시 합산됩니다.</p>
    </div>

    <button onclick="startAnalysis()" style="width:100%; padding: 16px; background: var(--ink); color:#fff; border:none; border-radius: 10px; font-weight: 700; cursor: pointer;">
      분석 시작하기
    </button>
  </div>

  <div id="resultsWrap" class="results-wrap">
    <div class="summary-card" id="summaryArea">
      <h2 style="margin:0 0 10px 0;">🧐 분석 요약</h2>
      <p id="summaryText">데이터를 분석 중입니다...</p>
    </div>

    <div id="detailSection" class="detail-box is-locked">
      <div class="paywall-overlay">
        <div class="paywall-card">
          <span style="font-size: 2rem;">🔒</span>
          <h3 style="margin: 10px 0;">상세 분석 리포트 잠금</h3>
          <p style="color: #666; font-size: 0.9rem; line-height: 1.4;">
            공정별 적정 단가와 절감 포인트,<br>전문가 코멘트를 확인해보세요.
          </p>
          <button class="btn-pay" onclick="requestPayment()">
            9,900원 결제하고 열기
          </button>
        </div>
      </div>

      <div class="detail-inner">
        <h4>📋 항목별 세부 진단</h4>
        <div id="itemsList">
          <div class="item-row"><span>목공사 상세 분석</span><strong>+120,000원</strong></div>
          <div class="item-row"><span>타일/욕실 상세 분석</span><strong>-50,000원</strong></div>
          <div class="item-row"><span>전기/조명 상세 분석</span><strong>적정</strong></div>
          <div class="item-row"><span>샷시/창호 상세 분석</span><strong>비쌈</strong></div>
          <div class="item-row"><span>도배/바닥 상세 분석</span><strong>적정</strong></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentMode = 'file';

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('fileMode').style.display = mode === 'file' ? 'block' : 'none';
  document.getElementById('manualMode').style.display = mode === 'manual' ? 'block' : 'none';
}

// 분석 시작 함수
async function startAnalysis() {
  // 로딩 로직 생략 (기존 기능 유지)
  document.getElementById('resultsWrap').classList.add('show');
  document.getElementById('summaryText').innerText = "전체적으로 적정한 견적입니다. 다만 몇몇 항목에서 비용 절감이 가능해 보입니다.";
  
  // 결과 위치로 이동
  document.getElementById('resultsWrap').scrollIntoView({ behavior: 'smooth' });
}

// 토스 결제 함수
async function requestPayment() {
  const clientKey = 'live_ck_ZORzdMaqN3wjk4WoPq85AkYXQGwy'; // 테스트용 키
  const tossPayments = TossPayments(clientKey);
  
  const orderId = 'ORDER-' + new Date().getTime();

  try {
    await tossPayments.requestPayment('카드', {
      amount: 9900,
      orderId: orderId,
      orderName: '인테리어 견적 상세 분석 리포트',
      successUrl: window.location.origin + window.location.pathname + '?pay=success',
      failUrl: window.location.origin + window.location.pathname + '?pay=fail',
    });
  } catch (err) {
    console.error(err);
  }
}

// 결제 여부 확인 및 UI 업데이트
window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('pay') === 'success') {
    const detail = document.getElementById('detailSection');
    detail.classList.remove('is-locked');
    detail.classList.add('is-unlocked');
    
    // 결과창을 바로 보여줌
    document.getElementById('resultsWrap').classList.add('show');
    detail.scrollIntoView();
    alert('결제가 완료되어 상세 분석 내용이 해제되었습니다.');
  }
}
</script>

</body>
</html>
