<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인테리어 견적 분석 — MAiN</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://js.tosspayments.com/v1/payment"></script>
<style>
:root {
  --ink: #0F0E0C; --paper: #F8F6F2; --surface: #FFFFFF; --rule: #E8E5E0;
  --accent: #1F4FD8; --muted: #8A8780; --radius: 14px;
}

body {
  font-family: 'Pretendard', sans-serif;
  background-color: var(--paper);
  color: var(--ink);
  margin: 0; padding: 20px;
  line-height: 1.6;
}

.container { max-width: 600px; margin: 0 auto; }

/* 분석 결과 요약 (항상 보임) */
.summary-card {
  background: var(--surface);
  padding: 24px;
  border-radius: var(--radius);
  border: 1px solid var(--rule);
  margin-bottom: 20px;
}

/* 상세 분석 영역 (결제 전 블러 처리) */
.detail-wrapper {
  position: relative;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--rule);
  overflow: hidden;
  min-height: 400px;
}

/* 블러 효과 적용 대상 */
.detail-content {
  padding: 20px;
  transition: filter 0.3s ease;
}

/* 결제 전 상태 클래스 */
.is-locked .detail-content {
  filter: blur(12px); /* 블러 강도 */
  pointer-events: none;
  user-select: none;
}

/* 결제 유도 레이어 (페이월) */
.paywall-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.4);
  z-index: 10;
}

.is-unlocked .paywall-overlay { display: none; }
.is-unlocked .detail-content { filter: none; }

.paywall-card {
  background: white;
  padding: 32px 24px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  text-align: center;
  width: 80%;
}

.paywall-card h3 { margin: 0 0 10px; font-size: 1.2rem; }
.paywall-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 24px; }

.btn-payment {
  background: var(--ink);
  color: white;
  border: none;
  padding: 16px 24px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  width: 100%;
  transition: transform 0.1s;
}

.btn-payment:active { transform: scale(0.98); }

/* 상세 항목 리스트 스타일(샘플) */
.item-row {
  padding: 15px 0;
  border-bottom: 1px dashed var(--rule);
}
.item-name { font-weight: 600; display: block; }
.item-price { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<div class="container">
  <div class="summary-card">
    <h2 style="margin-top:0;">📊 분석 요약</h2>
    <p>본 견적서는 전체적으로 <strong>적정 수준</strong>입니다.<br>
    총액 대비 약 12%의 절감 가능성이 확인되었습니다.</p>
  </div>

  <div id="detailSection" class="detail-wrapper is-locked">
    
    <div class="paywall-overlay">
      <div class="paywall-card">
        <h3>세부 항목 분석 잠금</h3>
        <p>항목별 적정 단가 비교와<br>공사별 절감 전략을 확인해보세요.</p>
        <button class="btn-payment" onclick="payNow()">
          분석 결과 열람하기 (9,900원)
        </button>
      </div>
    </div>

    <div class="detail-content">
      <h3>📋 공정별 세부 진단</h3>
      <div class="item-row">
        <span class="item-name">목공사 (몰딩/가벽)</span>
        <span class="item-price">적정가 대비 +150,000원 (다소 높음)</span>
      </div>
      <div class="item-row">
        <span class="item-name">타일 및 욕실</span>
        <span class="item-price">적정가 대비 -50,000원 (양호)</span>
      </div>
      <div class="item-row">
        <span class="item-name">전기 및 조명</span>
        <span class="item-price">적정가 대비 +200,000원 (조정 권장)</span>
      </div>
      <p style="margin-top:20px; font-size: 0.9rem; color: #666;">
        * 위 상세 분석은 실제 결제 후 선명하게 확인하실 수 있습니다.
      </p>
    </div>
  </div>
</div>

<script>
// 결제창 호출 함수
async function payNow() {
  const clientKey = 'live_ck_ZORzdMaqN3wjk4WoPq85AkYXQGwy'; // 테스트용 키 (실제 키로 교체 필요)
  const tossPayments = TossPayments(clientKey);
  
  const orderId = 'ORDER-' + new Date().getTime();

  try {
    await tossPayments.requestPayment('카드', {
      amount: 9900,
      orderId: orderId,
      orderName: '인테리어 견적 상세 분석 리포트',
      successUrl: window.location.origin + window.location.pathname + '?pay_status=success',
      failUrl: window.location.origin + window.location.pathname + '?pay_status=fail',
    });
  } catch (error) {
    console.error('결제 요청 중 오류 발생:', error);
  }
}

// 결제 완료 후 페이지가 다시 로드되었을 때 처리
function checkPaymentStatus() {
  const urlParams = new URLSearchParams(window.location.search);
  const status = urlParams.get('pay_status');

  if (status === 'success') {
    // 결제 성공 시 잠금 해제 클래스 적용
    const detailSection = document.getElementById('detailSection');
    detailSection.classList.remove('is-locked');
    detailSection.classList.add('is-unlocked');
    
    // 화면 위치 조정
    detailSection.scrollIntoView({ behavior: 'smooth' });
    alert('결제가 완료되었습니다. 상세 분석 내용을 확인하세요!');
  } else if (status === 'fail') {
    alert('결제에 실패했습니다. 다시 시도해주세요.');
  }
}

// 페이지 로드 시 상태 체크 실행
window.onload = checkPaymentStatus;
</script>

</body>
</html>
