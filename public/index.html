<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적분석 — 인테리어 견적 데이터 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://js.tosspayments.com/v1/payment"></script>
<style>
/* --- 기존 index_v12 스타일 유지 (생략 없이 모두 포함) --- */
:root {
  --ink: #0F0E0C; --ink2: #2A2825; --muted: #8A8780; --rule: #E8E5E0;
  --paper: #F8F6F2; --surface: #FFFFFF; --accent: #1F4FD8; --radius: 14px;
}
body { font-family: 'Pretendard', sans-serif; background: var(--paper); color: var(--ink); margin: 0; padding: 20px 10px; }
.app-wrap { max-width: 560px; margin: 0 auto; }

/* 블러 처리를 위한 필수 CSS */
.results-wrap { display: none; margin-top: 30px; }
.results-wrap.show { display: block; }

.detail-container { position: relative; margin-top: 20px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--rule); background: #fff; }
.blur-target { transition: filter 0.4s ease; padding: 20px; }

/* [중요] 결제 전 잠금 상태 스타일 */
.is-locked .blur-target { filter: blur(15px); pointer-events: none; user-select: none; }
.paywall-overlay {
  position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
  z-index: 100; background: rgba(255, 255, 255, 0.4);
}
.is-locked .paywall-overlay { display: flex; }

.paywall-card {
  background: #fff; padding: 35px 20px; border-radius: 20px; text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15); width: 85%; border: 1px solid var(--rule);
}
.btn-pay { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }

/* 기존 UI 컴포넌트 */
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { flex: 1; padding: 14px; text-align: center; background: #E8E5E0; border-radius: 10px; cursor: pointer; font-weight: 700; }
.tab.active { background: var(--ink); color: #fff; }
.input-section { background: var(--surface); padding: 24px; border-radius: var(--radius); border: 1px solid var(--rule); }
</style>
</head>
<body>

<div class="app-wrap">
  <div class="tabs">
    <div id="tabFile" class="tab active" onclick="switchMode('file')">파일 업로드</div>
    <div id="tabManual" class="tab" onclick="switchMode('manual')">직접 입력하기</div>
  </div>

  <div class="input-section">
    <div id="modeFile">
      <div id="dropZone" style="border: 2px dashed var(--rule); padding: 40px; text-align: center; border-radius: var(--radius); cursor: pointer;" onclick="document.getElementById('fileInput').click()">
        <p id="filePrompt">📄 견적서 파일을 올려주세요</p>
        <div id="fileInfo" style="display:none;">
          <strong id="fileNameDisplay"></strong><br>
          <button onclick="event.stopPropagation(); location.reload();">재업로드</button>
        </div>
        <input type="file" id="fileInput" hidden onchange="handleFile(this)">
      </div>
    </div>

    <div id="modeManual" style="display:none;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
        <input type="number" id="areaNum" placeholder="32" style="flex:1; padding:12px; border-radius:8px; border:1px solid var(--rule); font-weight:700;">
        <span style="font-weight:800;">평</span>
      </div>
      <p style="font-size:0.85rem; color:var(--muted); text-align:center;">각 공정별 금액을 입력하면 정밀 분석이 시작됩니다.</p>
    </div>

    <button id="analyzeBtn" onclick="doAnalyze()" style="width:100%; padding:20px; background:var(--ink); color:#fff; border:none; border-radius:14px; font-weight:800; margin-top:20px; cursor:pointer;">견적 분석 시작하기</button>
  </div>

  <div id="resultsWrap" class="results-wrap">
    <div class="summary-card" style="background:#fff; padding:20px; border-radius:var(--radius); border:1px solid var(--rule); text-align:center;">
      <h2 style="margin:0 0 10px 0;">⚖️ 분석 요약</h2>
      <p id="summaryText">분석 중...</p>
    </div>

    <div id="detailContainer" class="detail-container is-locked">
      <div class="paywall-overlay">
        <div class="paywall-card">
          <div style="font-size:2.5rem; margin-bottom:15px;">🔒</div>
          <h3 style="margin:0;">상세 분석 리포트 잠금</h3>
          <p style="font-size:0.9rem; color:var(--muted); margin-top:10px;">9,900원 결제 시 항목별 적정 단가와<br>비용 절감 포인트를 확인할 수 있습니다.</p>
          <button class="btn-pay" onclick="requestPayment()">결제하고 바로보기</button>
        </div>
      </div>

      <div class="blur-target" id="itemsList">
        </div>
    </div>
  </div>
</div>

<script>
let currentMode = 'file';

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeFile').style.display = mode === 'file' ? 'block' : 'none';
  document.getElementById('modeManual').style.display = mode === 'manual' ? 'block' : 'none';
  document.getElementById('tabFile').className = mode === 'file' ? 'tab active' : 'tab';
  document.getElementById('tabManual').className = mode === 'manual' ? 'tab active' : 'tab';
}

function handleFile(input) {
  if(input.files[0]) {
    document.getElementById('filePrompt').style.display = 'none';
    document.getElementById('fileInfo').style.display = 'block';
    document.getElementById('fileNameDisplay').innerText = input.files[0].name;
  }
}

// 분석 실행 (직접 입력 완료 시 호출)
function doAnalyze() {
  document.getElementById('resultsWrap').classList.add('show');
  document.getElementById('summaryText').innerText = "전체적으로 합리적인 견적이나, 일부 항목에서 조정이 필요합니다.";
  
  // 상세 데이터 렌더링 (is-locked이므로 블러 처리됨)
  const list = document.getElementById('itemsList');
  list.innerHTML = `
    <h4>📋 공정별 상세 분석</h4>
    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><span>목공사</span><strong>적정</strong></div>
    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;"><span>타일/욕실</span><strong>비쌈</strong></div>
    <div style="display:flex; justify-content:space-between; padding:10px 0;"><span>전기/조명</span><strong>적정</strong></div>
  `;
  window.scrollTo({ top: document.getElementById('resultsWrap').offsetTop - 20, behavior: 'smooth' });
}

// 토스 결제
async function requestPayment() {
  const tossPayments = TossPayments('test_ck_D5bZzxlz807y4vAn74rbVjYEyOfR');
  await tossPayments.requestPayment('카드', {
    amount: 9900,
    orderId: 'ORD-' + new Date().getTime(),
    orderName: '인테리어 견적 상세 분석',
    successUrl: window.location.origin + window.location.pathname + '?pay=success',
    failUrl: window.location.origin + window.location.pathname + '?pay=fail',
  });
}

// 결제 성공 후 처리
window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  if(params.get('pay') === 'success') {
    document.getElementById('resultsWrap').classList.add('show');
    document.getElementById('detailContainer').classList.remove('is-locked');
    alert('결제가 완료되어 상세 분석 결과가 공개되었습니다.');
  }
}
</script>
</body>
</html>
